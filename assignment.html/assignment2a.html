<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BULLETS LIST</title>
</head>
<body>
    <h3>Disc bullets list: </h3>
    <ul type="disc">
        <li>apple</li>
        <li>bananas</li>
        <li>lemons</li>
        <li>oranges</li>
        

    </ul>
    <h3>Circle bullets lists</h3>
    <ul type="circle">
         <li>apple</li>
        <li>bananas</li>
        <li>lemons</li>
        <li>oranges</li>
        

    </ul>
    <h3> Square bullets lists : </h3>
    <ul type = "square">
         <li>apple</li>
        <li>bananas</li>
        <li>lemons</li>
        <li>oranges</li>
        
    </ul>
    
</body>
</html>
